<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
    <title>Aula 02</title>
</head>

<body>
    <h1>Desafio das imagens</h1>
    <h2>Cariacica</h2>
    <img src="Kleber_Andrade.jpg" alt="Imagem aérea do Kleber Andrade em Cariacica" width="750">
    <h2>Imagem de Cariacica com legenda</h2>
    <figure>
        <img src="Segunda_Ponte.jpg" alt="Imagem da segunda ponte com Cariacica ao fundo">
        <figcaption>Imagem da segunda ponte com Cariacica ao fundo</figcaption>
    </figure>
    <picture>
        <source srcset="Kleber_Andrade.jpg" media="(max-width: 600px)" width="500px">
        <img src="Orla_de_Cariacica.jpg" alt="Imagem aérea da Orla de Cariacica" width="600px">
    </picture>
</body>

</html>
